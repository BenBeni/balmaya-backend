spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/balmaya_prod}
    username: ${SPRING_DATASOURCE_USERNAME:balmaya}
    password: ${SPRING_DATASOURCE_PASSWORD:balmaya}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:balmaya}

logging:
  level:
    root: INFO
    org.springframework: WARN
